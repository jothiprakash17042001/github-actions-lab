name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t prakash227/calculator-app .

    - name: Push Docker Image
      run: |
        docker tag prakash227/calculator-app prakash227/calculator-app:latest
        docker push prakash227/calculator-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop calculator || true
          docker rm calculator || true
          docker pull prakash227/calculator-app:latest
          docker run -d -p 80:5000 --name calculator prakash227/calculator-app:latest